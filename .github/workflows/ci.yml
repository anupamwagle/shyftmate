name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  api-test:
    name: API — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: gator
          POSTGRES_PASSWORD: gator
          POSTGRES_DB: gator_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check app/ tests/ || true

      - name: Type check (mypy)
        run: mypy app/ --ignore-missing-imports || true

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://gator:gator@localhost:5432/gator_test
          JWT_SECRET: test-secret-do-not-use
          SUPER_ADMIN_PASSWORD: TestPassword123!
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://gator:gator@localhost:5432/gator_test
          DATABASE_URL_SYNC: postgresql+psycopg2://gator:gator@localhost:5432/gator_test
          JWT_SECRET: test-secret-do-not-use
          LLM_PROVIDER: ollama
          SUPER_ADMIN_PASSWORD: TestPassword123!
          SUPER_ADMIN_EMAIL: superadmin@gator.local
        run: pytest tests/ -v --tb=short

  shyftmate-build:
    name: Shyftmate — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shyftmate

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: shyftmate/package.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:8000/api/v1

  mobile-check:
    name: Mobile — Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: mobile/package.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit || true

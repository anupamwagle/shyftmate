services:
  postgres:
    image: postgres:16-alpine
    container_name: gator_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gator
      POSTGRES_PASSWORD: gator_dev_password
      POSTGRES_DB: gator_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gator -d gator_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gator_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gator.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7-alpine
    container_name: gator_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── faster-whisper-server runs on the GPU machine (192.168.4.150) ────────────
  # Same approach as Ollama — the GPU box hosts both the LLM and the STT service.
  # No Docker GPU passthrough required on the dev machine.
  #
  # Start it on the GPU machine — see README or the comment in .env.dev.
  # WHISPER_SERVICE_URL below points the API at it.

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gator_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      - OLLAMA_BASE_URL=http://192.168.4.150:11434/v1
      - REDIS_URL=redis://redis:6379
      - WHISPER_SERVICE_URL=http://192.168.4.150:9000/v1
      - KOKORO_MODEL_CACHE=/models/kokoro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - kokoro_models:/models/kokoro
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  kokoro_models:

services:
  postgres:
    image: postgres:16-alpine
    container_name: gator_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gator
      POSTGRES_PASSWORD: gator_dev_password
      POSTGRES_DB: gator_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gator -d gator_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gator_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gator.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7-alpine
    container_name: gator_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── faster-whisper STT sidecar ───────────────────────────────────────────────
  # Whisper running as an OpenAI-compatible API on port 9000.
  # Model (~1.5 GB) auto-downloads on first start, cached in whisper_models volume.
  #
  # Currently: CPU mode (int8) — works out of the box, no driver setup needed.
  # For GPU: see instructions below to enable CUDA (faster, uses ~1.5 GB VRAM).
  #
  # ── To enable GPU (RTX 3070 Ti) ──────────────────────────────────────────
  # Run these commands in WSL2, then restart Docker Desktop:
  #
  #   curl -fsSL https://nvidia.github.io/libnvidia-container/gpgkey | \
  #     sudo gpg --dearmor -o /usr/share/keyrings/nvidia-container-toolkit-keyring.gpg
  #   curl -s -L https://nvidia.github.io/libnvidia-container/stable/deb/nvidia-container-toolkit.list | \
  #     sed 's#deb https://#deb [signed-by=/usr/share/keyrings/nvidia-container-toolkit-keyring.gpg] https://#g' | \
  #     sudo tee /etc/apt/sources.list.d/nvidia-container-toolkit.list
  #   sudo apt-get update && sudo apt-get install -y nvidia-container-toolkit
  #   sudo nvidia-ctk runtime configure --runtime=docker
  #
  # Then change:
  #   image: fedirz/faster-whisper-server:latest-cuda
  #   WHISPER__DEVICE: cuda
  # And uncomment the deploy block below.
  whisper:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: gator_whisper
    restart: unless-stopped
    ports:
      - "9000:8000"
    environment:
      WHISPER__MODEL: large-v3-turbo
      WHISPER__DEVICE: cpu
      WHISPER__LANGUAGE: en
      WHISPER__BEAM_SIZE: "5"
    volumes:
      - whisper_models:/root/.cache/huggingface
    # Uncomment when nvidia-container-toolkit is installed in WSL2:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gator_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      - OLLAMA_BASE_URL=http://192.168.4.150:11434/v1
      - REDIS_URL=redis://redis:6379
      - WHISPER_SERVICE_URL=http://whisper:8000/v1
      - KOKORO_MODEL_CACHE=/models/kokoro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - kokoro_models:/models/kokoro
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  whisper_models:
  kokoro_models:

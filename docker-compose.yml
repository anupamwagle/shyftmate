services:
  postgres:
    image: postgres:16-alpine
    container_name: gator_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gator
      POSTGRES_PASSWORD: gator_dev_password
      POSTGRES_DB: gator_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gator -d gator_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: gator_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gator.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_CHECK_EMAIL_DELIVERABILITY: "False"
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  redis:
    image: redis:7-alpine
    container_name: gator_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── faster-whisper STT sidecar ───────────────────────────────────────────────
  # GPU-accelerated Whisper running as an OpenAI-compatible API on port 9000.
  # The model (~1.5 GB) auto-downloads on first start and is cached in the
  # whisper_models volume so it survives container rebuilds.
  #
  # Requires: NVIDIA drivers on Windows + Docker Desktop (WSL2 backend).
  # No extra setup needed — Docker Desktop enables WSL2 CUDA automatically.
  #
  # Switch to it: set STT_PROVIDER=local in .env.dev
  # Use CPU instead: change image tag to latest-cpu and remove the deploy block
  whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: gator_whisper
    restart: unless-stopped
    ports:
      - "9000:8000"
    environment:
      WHISPER__MODEL: large-v3-turbo
      WHISPER__DEVICE: cuda
      WHISPER__LANGUAGE: en
      WHISPER__BEAM_SIZE: "5"
    volumes:
      - whisper_models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: gator_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env.dev
    environment:
      - OLLAMA_BASE_URL=http://192.168.4.150:11434/v1
      - REDIS_URL=redis://redis:6379
      - WHISPER_SERVICE_URL=http://whisper:8000/v1
      - KOKORO_MODEL_CACHE=/models/kokoro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app
      - kokoro_models:/models/kokoro
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  postgres_data:
  pgadmin_data:
  redis_data:
  whisper_models:
  kokoro_models:
